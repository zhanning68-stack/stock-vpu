<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stock VPU - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4d4d",
                        "background-light": "#f8f5f5",
                        "background-dark": "#0e1117",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Stock VPU</h2>
</div>
<div class="flex flex-col items-center px-4 pt-8">
<div class="relative w-full @container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[160px] relative bg-background-dark/50" style="">
<div class="relative z-10 flex justify-center pb-4">
<div class="bg-primary/20 p-4 rounded-full border border-primary/30 backdrop-blur-sm">
<span class="material-symbols-outlined text-primary text-5xl">monitoring</span>
</div>
</div>
</div>
</div>
</div>
<h1 class="text-slate-100 tracking-tight text-[32px] font-bold leading-tight px-4 text-center pb-1 pt-8">Create Account</h1>
<p class="text-primary text-base font-medium leading-normal pb-8 px-4 text-center uppercase tracking-widest text-sm">Quantitative Terminal Access</p>
</div>
<div class="flex flex-col gap-4 px-6 max-w-[480px] mx-auto w-full">
<div class="flex flex-col gap-1">
<label class="text-slate-300 text-sm font-medium leading-normal pl-1">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">person</span>
<input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-primary/5 h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal" placeholder="John Doe" required type="text"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-300 text-sm font-medium leading-normal pl-1">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">mail</span>
<input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-primary/5 h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal" placeholder="name@company.com" required type="email"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-300 text-sm font-medium leading-normal pl-1">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-primary/5 h-14 placeholder:text-slate-500 pl-12 pr-12 text-base font-normal" id="reg-password" required minlength="8" placeholder="••••••••" type="password" oninput="updateStrength(this.value)"/>
<span class="material-symbols-outlined absolute right-4 text-slate-400 cursor-pointer" onclick="const i=document.getElementById('reg-password');const t=i.type==='password'?'text':'password';i.type=t;this.textContent=t==='password'?'visibility_off':'visibility'">visibility_off</span>
</div>
<div class="flex gap-1 mt-2 px-1">
<div class="h-1 flex-1 rounded-full bg-slate-700" id="str-1"></div>
<div class="h-1 flex-1 rounded-full bg-slate-700" id="str-2"></div>
<div class="h-1 flex-1 rounded-full bg-slate-700" id="str-3"></div>
<div class="h-1 flex-1 rounded-full bg-slate-700" id="str-4"></div>
</div>
<p class="text-xs text-slate-500 pl-1 mt-1" id="str-label"></p>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-300 text-sm font-medium leading-normal pl-1">Confirm Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock_reset</span>
<input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-primary/5 h-14 placeholder:text-slate-500 pl-12 pr-12 text-base font-normal" id="confirm-password" required minlength="8" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-slate-400 cursor-pointer" onclick="const i=document.getElementById('confirm-password');const t=i.type==='password'?'text':'password';i.type=t;this.textContent=t==='password'?'visibility_off':'visibility'">visibility_off</span>
</div>
</div>
<div class="flex items-start space-x-2 px-1 pt-2">
<input class="rounded border-slate-700 bg-transparent text-primary focus:ring-primary mt-0.5" id="terms" required type="checkbox"/>
<label class="text-sm text-slate-400 cursor-pointer" for="terms">
I agree to the <a class="text-primary font-semibold hover:underline" href="#" onclick="event.stopPropagation()">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#" onclick="event.stopPropagation()">Privacy Policy</a>
</label>
</div>
<div class="pt-4 pb-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    Register Now
                    <span class="material-symbols-outlined">trending_up</span>
</button>
</div>
<div class="flex justify-center pb-12">
<p class="text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Login</a>
</p>
</div>
</div>
<script>
function updateStrength(pwd) {
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const colors = ['', '#ff4d4d', '#ff9800', '#ffc107', '#00e676'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    for (let i = 1; i <= 4; i++) {
        const el = document.getElementById('str-' + i);
        el.style.backgroundColor = i <= score ? colors[score] : '';
        if (i <= score) el.classList.remove('bg-slate-700');
        else el.classList.add('bg-slate-700');
    }
    document.getElementById('str-label').textContent = pwd.length > 0 ? labels[score] || '' : '';
    document.getElementById('str-label').style.color = colors[score] || '';
}
</script>
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]" data-alt="Faded stock market technical data overlay" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCqWSZhZHU55OKRFxktZ2JfDlVM9YjTDKcvs0vTiVPGrEO3hOh9PKKPlslIcla_ZZhy5ICAf3hSXjR5W07k9lfb1CF5OuhnUjJbmrYu6ztXH5ndeQuUYYEs9A9QRYbDupMwKKJMw-ZSVIxoQHmAAkPXYIhjW0IxxHFAHrTg39COZg2NVNf6cfbJsIkRDvgwYMquOTkI1Ii2l4l9LYvj6b-mpa-KMGnmUNXnONB0UvqVPOokEvqaaVUDShBHn_xy5H75LgtthVAXRl1u"); background-size: cover; background-position: center;'></div>
</div>
</body></html>

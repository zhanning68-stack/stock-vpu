<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stock VPU - Terminal Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4d4d",
                        "background-light": "#f8f5f5",
                        "background-dark": "#0e1117",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .grid-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 77, 77, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .chart-glow {
            background: linear-gradient(180deg, rgba(255, 77, 77, 0.05) 0%, rgba(14, 17, 23, 0) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute inset-0 grid-pattern opacity-40 pointer-events-none"></div>
<div class="absolute top-0 left-0 w-full h-1/2 chart-glow pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Logo & Header -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary/10 rounded-xl flex items-center justify-center mb-4 border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">trending_up</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-2">Stock VPU</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Quantitative Terminal Access</p>
</div>
<!-- Login Card -->
<div class="bg-white/5 dark:bg-[#161b22]/50 backdrop-blur-md border border-slate-200 dark:border-slate-800 p-8 rounded-2xl shadow-2xl">
<h2 class="text-xl font-semibold mb-6 text-center">Welcome Back</h2>
<form action="#" class="space-y-5">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-500 dark:placeholder:text-slate-600" placeholder="email@domain.com" required type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl py-3.5 pl-12 pr-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-500 dark:placeholder:text-slate-600" placeholder="••••••••" required minlength="8" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2 px-1">
<input class="rounded border-slate-300 dark:border-slate-700 bg-transparent text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400 cursor-pointer" for="remember">Stay signed in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-[#ff6b6b] hover:from-[#ff3333] hover:to-[#ff4d4d] text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transform active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Access Terminal</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    New to the platform? 
                    <a class="text-primary font-semibold hover:underline" href="#">Register Now</a>
</p>
</div>
</div>
<!-- Terminal Footer Decor -->
<div class="mt-8 flex justify-between items-center px-4 opacity-40">
<div class="flex space-x-4">
<div class="flex items-center space-x-1">
<div class="w-2 h-2 rounded-full bg-green-500"></div>
<span class="text-[10px] font-mono uppercase">Live Feed</span>
</div>
<div class="flex items-center space-x-1">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<span class="text-[10px] font-mono uppercase">Secure Node</span>
</div>
</div>
<span class="text-[10px] font-mono">V. 4.0.2-BETA</span>
</div>
<!-- Subtle Candlestick Chart Decoration -->
<div class="fixed bottom-0 left-0 w-full h-32 flex items-end justify-around px-8 opacity-10 pointer-events-none">
<div class="w-4 h-24 bg-slate-500 relative"><div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0.5 h-32 bg-slate-500"></div></div>
<div class="w-4 h-16 bg-primary relative"><div class="absolute -top-6 left-1/2 -translate-x-1/2 w-0.5 h-28 bg-primary"></div></div>
<div class="w-4 h-28 bg-slate-500 relative"><div class="absolute -top-2 left-1/2 -translate-x-1/2 w-0.5 h-32 bg-slate-500"></div></div>
<div class="w-4 h-12 bg-primary relative"><div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0.5 h-20 bg-primary"></div></div>
<div class="w-4 h-20 bg-slate-500 relative"><div class="absolute -top-8 left-1/2 -translate-x-1/2 w-0.5 h-36 bg-slate-500"></div></div>
<div class="w-4 h-16 bg-primary relative"><div class="absolute -top-2 left-1/2 -translate-x-1/2 w-0.5 h-24 bg-primary"></div></div>
<div class="w-4 h-32 bg-slate-500 relative"><div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0.5 h-40 bg-slate-500"></div></div>
</div>
</main>
</body></html>
